<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resolución de Supuestos - La Rioja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pantalla-menu" class="container">
        <header><h1>Estructura de Resolución</h1></header>
        <div id="grid-indice" class="grid-indice"></div>
        <div class="header-seccion" style="text-align:center; margin-top:20px;">
            <button class="btn-grid" style="width: 200px;" onclick="router('desarrollo')">Ver Desarrollo Especial</button>
        </div>
    </div>

    <div id="pantalla-visor" class="container hidden">
        <header id="cabecera-visor">
            <h1 id="titulo-seccion">Sección</h1>
        </header>
        <div id="contenido-cascada" class="cascada-container"></div>
        <nav class="nav-inferior">
            <button class="btn-nav" onclick="cambiarSeccion(-1)">◀ Ant.</button>
            <button class="btn-nav btn-home" onclick="irAlMenu()">ÍNDICE</button>
            <button class="btn-nav" onclick="cambiarSeccion(1)">Sig. ▶</button>
        </nav>
    </div>

    <div id="view-desarrollo" class="container hidden" style="padding-bottom: 100px;">
        <header>
            <h1>Desarrollo Transversal</h1>
        </header>
        <div class="header-seccion" style="border:none;">
            <p class="desc-seccion">Selecciona un número de supuesto para ver el contenido específico de cada apartado unificado.</p>
        </div>
        
        <div id="lista-desarrollo" class="cascada-container">
            </div>

        <nav class="nav-inferior">
            <button class="btn-nav btn-home" style="flex:1;" onclick="irAlMenu()">VOLVER AL ÍNDICE</button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
